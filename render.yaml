services:
  - type: web
    name: cordane-neural-engine
    env: python
    buildCommand: "cd api && pip install -r requirements.txt"
    startCommand: "cd api && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AIML_API_KEY
        sync: false
      - key: BAND_API_KEY
        sync: false
